
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RobotCode Arena</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Rajdhani:wght@400;500;700&family=Fira+Code:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&family=Source+Code+Pro:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    /* For CircularText component */
    .circular-text {
      width: 150px; /* Base width, component can override */
      height: 150px; /* Base height, component can override */
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative; /* Needed for letter positioning */
      border-radius: 50%;
      /* background-color: rgba(255, 255, 255, 0.1); Optional: for visualization */
    }

    .circular-text span {
      position: absolute; /* Component also sets this, but good default */
      /* height: 75px; Removed - Component handles this dynamically */
      /* transform-origin: center calc(75px); Removed - Component handles this dynamically */
      font-size: 0.8rem; /* Can be overridden by component or Tailwind */
      text-transform: uppercase;
      font-family: 'Orbitron', sans-serif;
    }
  </style>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            orbitron: ['Orbitron', 'sans-serif'],
            rajdhani: ['Rajdhani', 'sans-serif'],
            'fira-code': ['Fira Code', 'monospace'],
            'jetbrains-mono': ['JetBrains Mono', 'monospace'],
            'source-code-pro': ['Source Code Pro', 'monospace'],
            mono: ['Fira Code', 'JetBrains Mono', 'Source Code Pro', 'monospace'],
          },
          colors: {
            'main-dark': '#0F172A',
            'secondary-dark': '#1E293B',
            'accent-sky': '#38BDF8',
            'accent-yellow': '#FACC15',
            'accent-red': '#F87171',
            'accent-green': '#4ADE80',
            'text-dark-main': '#E2E8F0',
            'text-light-main': '#1E293B',
          },
          keyframes: {
            typing: {
              "0%": { width: "0%", visibility: "hidden" },
              "100%": { width: "100%" }
            },
            blink: {
              "50%": { borderColor: "transparent" },
              "100%": { borderColor: "white" }
            },
            glitch: {
              '0%': { transform: 'translate(0)', textShadow: 'none' },
              '10%': { transform: 'translate(-2px, -2px)', textShadow: '1px 1px 0 #F87171, -1px -1px 0 #38BDF8' },
              '20%': { transform: 'translate(2px, -2px)', textShadow: '-1px 1px 0 #F87171, 1px -1px 0 #38BDF8' },
              '30%': { transform: 'translate(-2px, 2px)', textShadow: '1px -1px 0 #F87171, -1px 1px 0 #38BDF8' },
              '40%': { transform: 'translate(2px, 2px)', textShadow: '-1px -1px 0 #F87171, 1px 1px 0 #38BDF8' },
              '50%': { transform: 'translate(0)', textShadow: '1px 0 0 #F87171, 0 1px 0 #38BDF8, -1px 0 0 #38BDF8, 0 -1px 0 #F87171' },
              '60%': { transform: 'translate(-1px, 1px) skewX(5deg) skewY(1deg)', textShadow: 'none' },
              '70%': { transform: 'translate(1px, -1px) skewX(-5deg) skewY(-1deg)', textShadow: '2px 2px 0px #38BDF8, -2px -2px 0px #F87171' },
              '80%': { transform: 'translate(0,0) skewX(0) skewY(0)', textShadow: '1px 1px 0 #FACC15' },
              '90%': { transform: 'translate(0,0)', textShadow: 'none' },
              '100%': { transform: 'translate(0)', textShadow: 'none' },
            },
            float: {
              '0%, 100%': { transform: 'translateY(0px)' },
              '50%': { transform: 'translateY(-20px)' },
            }
          },
          animation: {
            typing: "typing 2s steps(20) forwards, blink .5s infinite",
            glitch: 'glitch 0.3s linear',
            float: 'float 6s ease-in-out infinite',
          }
        }
      }
    }
  </script>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.1.0/",
    "react": "https://esm.sh/react@^19.1.0",
    "react-dom/": "https://esm.sh/react-dom@^19.1.0/",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.6.2",
    "react-icons/": "https://esm.sh/react-icons@^5.5.0/",
    "zustand": "https://esm.sh/zustand@^5.0.5",
    "@monaco-editor/react": "https://esm.sh/@monaco-editor/react@^4.7.0",
    "recharts": "https://esm.sh/recharts@^2.15.3",
    "framer-motion": "https://esm.sh/framer-motion@^11.3.19"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-white dark:bg-main-dark text-text-light-main dark:text-text-dark-main font-rajdhani">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
